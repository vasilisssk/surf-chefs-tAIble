server:
  servlet:
    context-path: /v1

spring:
  application:
    name: chefs-table-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chefs_table}
    username: ${DB_USERNAME:chefs_table}
    password: ${DB_PASSWORD:chefs_table}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}

logging:
  level:
    com.chefstable.backend: INFO
    org.springframework.security: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
